name: Link Check

# Validates that every URL in the public Markdown files resolves.
# Runs on:
#   - PRs that touch any *.md file (or this workflow itself)
#   - A weekly cron (Mondays 08:00 UTC) to catch link rot in entries
#   - Manual dispatch (workflow_dispatch) for ad-hoc re-runs
#
# Skip-list policy:
#   We deliberately ship with no skip-list. If a domain becomes
#   chronically flaky in CI (e.g. linkedin.com / twitter.com / x.com
#   rate-limit responses), add it to a `.lycheeignore` file at the
#   repo root — lychee picks it up automatically. Document each
#   added domain with a one-line comment in `.lycheeignore`.
#
# --accept codes:
#   Accepted HTTP status codes (treated as success in addition to
#   lychee's default 2xx):
#     - 200 OK (default; explicit for clarity)
#     - 206 Partial Content (HEAD requests on some CDNs)
#     - 429 Too Many Requests (CI rate-limit; do not fail PRs on this)
#   Codes NOT accepted that may surface periodically:
#     - 403 Forbidden (some sites block CI user agents) — surface for triage
#     - 404 Not Found — real link rot, must be fixed
#     - 5xx — upstream issues; usually transient, retried automatically

on:
  pull_request:
    paths:
      - "**.md"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "0 8 * * 1"  # Mondays 08:00 UTC — weekly link-rot sweep
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # Required when scheduled runs surface a tracking issue

jobs:
  link-check:
    name: Run lychee on Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            --max-retries 3
            --retry-wait-time 5
            --timeout 20
            './**/*.md'
          # PR runs fail on broken links so the contributor sees red.
          # Scheduled and manual runs do not fail the workflow — the
          # report is surfaced via the GitHub step summary and (if
          # any links are broken) a sticky tracking issue.
          fail: ${{ github.event_name == 'pull_request' }}
